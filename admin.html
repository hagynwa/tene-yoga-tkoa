<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>טנא יוגה · ניהול</title>
  <link rel="icon" type="image/jpeg" href="logo.jpg" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@500;700;900&family=Assistant:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: {
        colors: {
          cream:  { 50:'#FBF6E9', 100:'#F6EAD0', 200:'#EFDDB8' },
          terra:  { 400:'#E08658', 500:'#D9531E', 600:'#C44425', 700:'#9E331A' },
          olive:  { 500:'#8C9A5A', 600:'#6E7D45', 700:'#525E33' },
          wine:   { 500:'#5B4374', 600:'#48345C' },
          wheat:  { 500:'#C9A961', 600:'#B89040' },
          sepia:  { 500:'#8B6F47', 600:'#6B4E2E', 700:'#3D2E1F' },
        },
        fontFamily: { display: ['"Frank Ruhl Libre"', 'serif'], body: ['"Assistant"', 'sans-serif'] },
      }}
    };
  </script>

  <style>
    body { font-family: 'Assistant', sans-serif; color: #3D2E1F; background: #FBF6E9; }
    .glass { background: rgba(255,251,233,0.85); border: 1px solid rgba(184,144,64,0.28); backdrop-filter: blur(6px); }
    .btn  { background: linear-gradient(135deg, #6E7D45, #8C9A5A); color: #FBF6E9; transition: transform 0.2s; }
    .btn:hover { transform: translateY(-1px); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-terra { background: linear-gradient(135deg, #C44425, #D9531E); color: #FBF6E9; }
    .btn-ghost { background: transparent; color: #6B4E2E; border: 1px solid rgba(184,144,64,0.35); }
    .input { background: #FBF6E9; border: 1px solid rgba(184,144,64,0.4); border-radius: 0.5rem; padding: 0.55rem 0.85rem; font-size: 16px; }
    .input:focus { outline: none; border-color: #D9531E; }
    input, textarea, select { font-size: 16px; }  /* prevent iOS zoom */
    button { min-height: 44px; }  /* touch target */
    .pill { display: inline-block; padding: 0.15rem 0.65rem; border-radius: 999px; font-size: 0.75rem; }
    .pill-active   { background: rgba(140,154,90,0.2);  color: #525E33; }
    .pill-inactive { background: rgba(196,68,37,0.15);  color: #9E331A; }
    .pill-trial    { background: rgba(217,194,133,0.30); color: #8E6E2D; }
    .pill-regular  { background: rgba(184,144,64,0.12);  color: #6B4E2E; }
  </style>
</head>
<body class="min-h-screen">

  <!-- LOGIN ------------------------------------------------------ -->
  <section id="login" class="min-h-screen flex items-center justify-center p-4">
    <div class="glass rounded-3xl shadow-lg p-8 w-full max-w-sm">
      <div class="text-center mb-6">
        <img src="logo.jpg" class="w-24 h-24 mx-auto rounded-full mb-3 shadow" alt="לוגו" />
        <h1 class="font-display font-bold text-2xl text-sepia-700">ניהול · טנא יוגה</h1>
        <p class="text-sepia-500 text-sm mt-1">כניסה לאזור האישי</p>
      </div>

      <form id="login-form" class="space-y-3">
        <label class="block">
          <span class="text-xs text-sepia-500 mb-1 block">שם משתמש</span>
          <input id="username" type="text" required value="itael8" class="input w-full" dir="ltr" />
        </label>
        <label class="block">
          <span class="text-xs text-sepia-500 mb-1 block">סיסמה</span>
          <input id="password" type="password" required class="input w-full" dir="ltr" />
        </label>
        <div id="login-error" class="hidden text-terra-600 text-sm bg-terra-400/10 border border-terra-400/30 rounded-lg px-3 py-2"></div>
        <button id="login-btn" type="submit" class="btn w-full py-3 rounded-full font-bold">כניסה</button>
      </form>
      <p class="mt-4 text-center"><a href="index.html" class="text-xs text-sepia-500 hover:underline">חזרה לאתר</a></p>
    </div>
  </section>

  <!-- DASHBOARD -------------------------------------------------- -->
  <section id="dashboard" class="hidden">
    <header class="glass border-b border-wheat-500/20 sticky top-0 z-10">
      <div class="max-w-6xl mx-auto px-3 sm:px-4 py-3 flex items-center justify-between gap-2">
        <div class="flex items-center gap-2 sm:gap-3 min-w-0">
          <img src="logo.jpg" class="w-9 h-9 sm:w-10 sm:h-10 rounded-full flex-shrink-0" alt="" />
          <div class="min-w-0">
            <div class="font-display font-bold text-sepia-700 text-sm sm:text-base truncate">ניהול · טנא יוגה</div>
            <div id="who" class="text-xs text-sepia-500 truncate" dir="ltr"></div>
          </div>
        </div>
        <button id="logout" class="btn-ghost px-3 sm:px-4 py-2 rounded-full text-sm flex-shrink-0">יציאה</button>
      </div>

      <div class="max-w-6xl mx-auto px-3 sm:px-4 pb-3 flex gap-2">
        <button data-tab="classes"      class="tab-btn px-4 py-2 rounded-full text-sm bg-cream-100">שיעורים</button>
        <button data-tab="enrollments"  class="tab-btn px-4 py-2 rounded-full text-sm">הרשמות</button>
      </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 sm:p-6">

      <!-- TAB: CLASSES -->
      <section data-pane="classes">
        <div class="flex items-center justify-between mb-4">
          <h2 class="font-display font-bold text-2xl text-sepia-700">שיעורים</h2>
          <button id="add-class-btn" class="btn px-5 py-2 rounded-full text-sm font-bold">+ שיעור חדש</button>
        </div>

        <div id="classes-list" class="space-y-3">
          <div class="text-sepia-500 text-sm">טוען…</div>
        </div>
      </section>

      <!-- TAB: ENROLLMENTS -->
      <section data-pane="enrollments" class="hidden">
        <div class="flex items-center justify-between mb-4 gap-3 flex-wrap">
          <h2 class="font-display font-bold text-2xl text-sepia-700">הרשמות</h2>
          <div class="flex items-center gap-2">
            <select id="filter-class" class="input text-sm">
              <option value="">כל השיעורים</option>
            </select>
            <button id="export-csv" class="btn-ghost px-4 py-2 rounded-full text-sm">ייצוא CSV</button>
          </div>
        </div>

        <div class="glass rounded-2xl overflow-hidden">
          <div class="overflow-x-auto">
            <table class="w-full text-sm">
              <thead class="bg-cream-100 text-sepia-600">
                <tr>
                  <th class="px-3 sm:px-4 py-3 text-right">שם</th>
                  <th class="px-3 sm:px-4 py-3 text-right">טלפון</th>
                  <th class="px-4 py-3 text-right hidden md:table-cell">אימייל</th>
                  <th class="px-4 py-3 text-right hidden sm:table-cell">שיעור</th>
                  <th class="px-3 py-3 text-right hidden sm:table-cell">סוג</th>
                  <th class="px-4 py-3 text-right hidden lg:table-cell">הערות</th>
                  <th class="px-4 py-3 text-right hidden md:table-cell">תאריך הרשמה</th>
                  <th class="px-2 py-3"></th>
                </tr>
              </thead>
              <tbody id="enrollments-tbody">
                <tr><td class="px-4 py-6 text-sepia-500" colspan="7">טוען…</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </section>
    </main>
  </section>

  <!-- CLASS MODAL ------------------------------------------------ -->
  <div id="class-modal" class="hidden fixed inset-0 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4 bg-sepia-700/40 backdrop-blur-sm overflow-y-auto">
    <div class="glass rounded-t-3xl sm:rounded-3xl p-5 sm:p-6 w-full max-w-lg max-h-[92vh] overflow-y-auto">
      <div class="flex items-center justify-between mb-4">
        <h3 id="class-modal-title" class="font-display font-bold text-xl text-sepia-700">שיעור חדש</h3>
        <button data-close-class class="w-9 h-9 rounded-full bg-cream-100 hover:bg-cream-200 flex items-center justify-center">
          <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <form id="class-form" class="grid grid-cols-1 sm:grid-cols-2 gap-3">
        <input type="hidden" id="cls-id" />

        <label class="sm:col-span-2"><span class="text-xs text-sepia-500 block mb-1">כותרת</span>
          <input id="cls-title" class="input w-full" required value="שיעור ניסיון" />
        </label>

        <label><span class="text-xs text-sepia-500 block mb-1">תאריך</span>
          <input id="cls-date-iso" type="date" class="input w-full" required dir="ltr" />
        </label>
        <label><span class="text-xs text-sepia-500 block mb-1">תצוגת תאריך (לאתר)</span>
          <input id="cls-date-disp" class="input w-full" placeholder="8.5" required />
        </label>

        <label class="sm:col-span-2"><span class="text-xs text-sepia-500 block mb-1">תאריך עברי (לא חובה)</span>
          <input id="cls-hebrew" class="input w-full" placeholder="כ״א באייר" />
        </label>

        <label><span class="text-xs text-sepia-500 block mb-1">שעת התחלה</span>
          <input id="cls-time-start" class="input w-full" placeholder="08:30" required dir="ltr" />
        </label>
        <label><span class="text-xs text-sepia-500 block mb-1">שעת סיום</span>
          <input id="cls-time-end" class="input w-full" placeholder="09:45" dir="ltr" />
        </label>

        <label><span class="text-xs text-sepia-500 block mb-1">מיקום שורה 1</span>
          <input id="cls-loc-1" class="input w-full" value="סטודיו של איתן" />
        </label>
        <label><span class="text-xs text-sepia-500 block mb-1">מיקום שורה 2</span>
          <input id="cls-loc-2" class="input w-full" value="תכלת מרדכי 529, תקוע" />
        </label>

        <label><span class="text-xs text-sepia-500 block mb-1">קיבולת</span>
          <input id="cls-capacity" type="number" class="input w-full" value="20" />
        </label>
        <label class="sm:col-span-2"><span class="text-xs text-sepia-500 block mb-1">קישור Waze (לא חובה)</span>
          <input id="cls-waze-url" class="input w-full" placeholder="https://waze.com/ul/..." dir="ltr" />
        </label>
        <label class="flex items-center gap-2 pb-2 pt-2 sm:pt-0"><input id="cls-active" type="checkbox" class="w-5 h-5" checked />
          <span class="text-sepia-700">פעיל (יוצג באתר)</span>
        </label>
        <label class="flex items-center gap-2 pb-2 pt-2 sm:pt-0"><input id="cls-trial" type="checkbox" class="w-5 h-5" />
          <span class="text-sepia-700">שיעור ניסיון</span>
        </label>

        <label class="sm:col-span-2"><span class="text-xs text-sepia-500 block mb-1">הערות פנימיות</span>
          <textarea id="cls-notes" class="input w-full" rows="2"></textarea>
        </label>

        <div id="class-error" class="hidden sm:col-span-2 text-terra-600 text-sm bg-terra-400/10 border border-terra-400/30 rounded-lg px-3 py-2"></div>

        <button type="submit" class="btn sm:col-span-2 py-3 rounded-full font-bold mt-2">שמירה</button>
      </form>
    </div>
  </div>

  <script src="assets/config.js"></script>
  <script type="module" src="assets/admin.js"></script>
</body>
</html>
